<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regulator Flow</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 320px;
            --bg: #0a0a0a;
            --surface: #161616;
            --opay-teal: #00d09c;
            --opay-red: #f43f5e;
            --text: #ffffff;
            --text-dim: #888888;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; margin: 0; display: flex; }

        .sidebar { width: var(--sidebar-width); background: #000; height: 100vh; position: fixed; padding: 40px 25px; border-right: 1px solid #222; display: flex; flex-direction: column; }
        .main-content { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); padding: 40px; }
        
        .live-box { background: #111; border-radius: 12px; padding: 15px; border: 1px dashed #333; margin-bottom: 25px; text-align: center; }
        .live-time { font-size: 1.4rem; font-weight: 800; color: var(--opay-teal); line-height: 1; }
        .live-date { font-size: 0.85rem; color: var(--text-dim); margin-top: 5px; font-weight: 600; }

        .label { font-size: 0.75rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; }
        .input-custom { background: #111; border: 1px solid #333; color: white; border-radius: 12px; padding: 15px; width: 100%; margin-bottom: 20px; text-transform: uppercase; }
        .select-custom { background: #222; border: 1px solid #444; color: white; border-radius: 8px; padding: 8px; font-weight: 600; cursor: pointer; }
        
        .btn-opay { background: var(--opay-teal); color: #000; font-weight: 800; border: none; border-radius: 12px; padding: 15px; width: 100%; transition: 0.2s; }

        .toggle-group { display: flex; background: #111; padding: 5px; border-radius: 12px; width: fit-content; gap: 5px; }
        .toggle-btn { background: transparent; border: none; color: var(--text-dim); padding: 8px 16px; border-radius: 8px; font-weight: 600; font-size: 0.85rem; }
        .toggle-btn.active { background: #333; color: white; }

        .flow-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .flow-card { background: var(--surface); border-radius: 24px; padding: 30px; border: 1px solid #222; }
        
        .tx-item { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #222; }

        #printArea { display: none; }
        @media print {
            .sidebar, .main-content, .no-print { display: none !important; }
            #printArea { display: block !important; padding: 50px; color: #000; background: #fff; font-family: sans-serif; }
            .p-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #eee; font-size: 18px; }
            .p-total { font-weight: 800; font-size: 24px; border-bottom: 2px solid #000; margin-top: 20px; }
            .p-header { margin-bottom: 40px; border-bottom: 1px solid #000; padding-bottom: 20px; }
            .p-header h1 { margin: 0; font-weight: 800; font-size: 28px; text-transform: uppercase; }
        }

        #toast { visibility: hidden; min-width: 200px; background-color: #222; color: #fff; text-align: center; border-radius: 10px; padding: 12px; position: fixed; z-index: 2000; left: 50%; bottom: 30px; transform: translateX(-50%); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

    <div id="toast">Message</div>

    <div class="sidebar no-print">
        <h4 class="fw-800 mb-4" style="color: var(--opay-teal);">REGULATOR FLOW</h4>
        
        <div class="live-box">
            <div class="live-time" id="clock">00:00:00</div>
            <div class="live-date" id="dateDisplay">Loading...</div>
        </div>

        <label class="label">Reason</label>
        <input type="text" id="reason" class="input-custom" placeholder="DESCRIPTION">
        
        <label class="label">Amount (₦)</label>
        <input type="number" id="amount" class="input-custom" placeholder="0.00">
        
        <button onclick="addRecord('income')" class="btn-opay mb-3">ADD ADDITION</button>
        <button onclick="addRecord('deduct')" class="btn-opay" style="background: transparent; border: 2px solid var(--opay-red); color: var(--opay-red);">ADD DEDUCTION</button>
        
        <div class="mt-auto">
            <button onclick="window.print()" class="btn btn-sm btn-outline-secondary w-100">Print Simple Summary</button>
        </div>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="toggle-group">
                <button class="toggle-btn" id="btn-week" onclick="setView('week')">Week</button>
                <button class="toggle-btn active" id="btn-month" onclick="setView('month')">Month</button>
                <button class="toggle-btn" id="btn-year" onclick="setView('year')">Year</button>
                <button class="toggle-btn" id="btn-all" onclick="setView('all')">All</button>
            </div>

            <div id="monthSelectorContainer">
                <select id="monthPicker" class="select-custom" onchange="render()">
                    <option value="0">January</option>
                    <option value="1">February</option>
                    <option value="2">March</option>
                    <option value="3">April</option>
                    <option value="4">May</option>
                    <option value="5">June</option>
                    <option value="6">July</option>
                    <option value="7">August</option>
                    <option value="8">September</option>
                    <option value="9">October</option>
                    <option value="10">November</option>
                    <option value="11">December</option>
                </select>
            </div>
        </div>
        
        <div class="flow-grid">
            <div class="flow-card"><div class="label" style="color: var(--opay-teal);">Total In</div><h1 class="fw-800 mb-0">₦<span id="displayIn">0.00</span></h1></div>
            <div class="flow-card"><div class="label" style="color: var(--opay-red);">Total Out</div><h1 class="fw-800 mb-0">₦<span id="displayOut">0.00</span></h1></div>
        </div>
        <div id="txList"></div>
    </div>

    <div id="printArea">
        <div class="p-header">
            <h1>Flow Summary</h1>
            <p>Generated: <span id="pFullTimestamp"></span></p>
            <p>Period: <span id="pRange">This Month</span></p>
        </div>
        <div class="p-row"><span>Total Additions</span><span id="pIn">₦0.00</span></div>
        <div class="p-row"><span>Total Deductions</span><span id="pOut">₦0.00</span></div>
        <div class="p-row p-total"><span>Net Balance</span><span id="pNet">₦0.00</span></div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('reg_v17')) || [];
        let currentView = 'month';

        function init() {
            const now = new Date();
            document.getElementById('monthPicker').value = now.getMonth();
            startClock();
            render();
        }

        function startClock() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('clock').innerText = now.toLocaleTimeString([], { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
                document.getElementById('dateDisplay').innerText = now.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
            }, 1000);
        }

        function showToast(msg) {
            const x = document.getElementById("toast");
            x.innerText = msg; x.className = "show";
            setTimeout(() => { x.className = x.className.replace("show", ""); }, 2500);
        }

        function addRecord(type) {
            const a = parseFloat(document.getElementById('amount').value);
            const r = document.getElementById('reason').value.trim().toUpperCase() || "ENTRY";
            if (!a) return showToast("INPUT AMOUNT");
            db.push({ amt: a, type, reason: r, date: new Date().toISOString() });
            localStorage.setItem('reg_v17', JSON.stringify(db));
            document.getElementById('amount').value = ''; document.getElementById('reason').value = '';
            showToast("RECORDED");
            render();
        }

        function setView(v) {
            currentView = v;
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + v).classList.add('active');
            
            // Hide/Show month picker based on view
            document.getElementById('monthPicker').style.display = (v === 'month') ? 'block' : 'none';
            render();
        }

        function render() {
            const now = new Date();
            let tin = 0, tout = 0;
            const selectedMonth = parseInt(document.getElementById('monthPicker').value);
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

            const filtered = db.filter(i => {
                const d = new Date(i.date);
                if (currentView === 'all') return true;
                if (currentView === 'year') return d.getFullYear() === now.getFullYear();
                if (currentView === 'month') return d.getMonth() === selectedMonth && d.getFullYear() === now.getFullYear();
                if (currentView === 'week') return (now - d) / (1000 * 60 * 60 * 24) <= 7;
            }).sort((a,b) => new Date(b.date) - new Date(a.date));

            document.getElementById('txList').innerHTML = filtered.map(i => `
                <div class="tx-item">
                    <div><b>${i.reason}</b><div class="text-dim small">${new Date(i.date).toLocaleDateString()}</div></div>
                    <div class="fw-800 ${i.type === 'income' ? 'text-success' : 'text-danger'}">${i.type === 'income' ? '+' : '-'}₦${i.amt.toLocaleString()}</div>
                </div>`).join('');

            filtered.forEach(i => i.type === 'income' ? tin += i.amt : tout += i.amt);

            // Update Dash
            document.getElementById('displayIn').innerText = tin.toLocaleString();
            document.getElementById('displayOut').innerText = tout.toLocaleString();
            
            // Update Print Document
            const rangeLabel = currentView === 'month' ? monthNames[selectedMonth] : currentView.toUpperCase();
            document.getElementById('pRange').innerText = rangeLabel;
            document.getElementById('pFullTimestamp').innerText = now.toLocaleString();
            document.getElementById('pIn').innerText = '₦' + tin.toLocaleString();
            document.getElementById('pOut').innerText = '₦' + tout.toLocaleString();
            document.getElementById('pNet').innerText = '₦' + (tin - tout).toLocaleString();
        }

        init();
    </script>
</body>
</html>
