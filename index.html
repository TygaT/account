<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regulator Flow | Matrix</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 340px;
            --bg: #0a0a0a;
            --surface: #161616;
            --opay-teal: #00d09c;
            --opay-red: #f43f5e;
            --text: #ffffff;
            --text-dim: #888888;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; margin: 0; display: flex; overflow-x: hidden; }

        /* SIDEBAR */
        .sidebar { width: var(--sidebar-width); background: #000; height: 100vh; position: fixed; padding: 30px 25px; border-right: 1px solid #222; display: flex; flex-direction: column; overflow-y: auto; z-index: 100; }
        .main-content { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); padding: 40px; }
        
        .live-box { background: #111; border-radius: 12px; padding: 15px; border: 1px dashed #333; margin-bottom: 20px; text-align: center; }
        .live-time { font-size: 1.2rem; font-weight: 800; color: var(--opay-teal); }

        .label { font-size: 0.7rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; display: block; }
        .input-custom { background: #111; border: 1px solid #333; color: white; border-radius: 10px; padding: 12px; width: 100%; margin-bottom: 15px; font-size: 0.9rem; }
        .select-custom { background: #222; border: 1px solid #444; color: white; border-radius: 8px; padding: 8px 12px; font-weight: 600; font-size: 0.85rem; outline: none; }
        
        .btn-opay { background: var(--opay-teal); color: #000; font-weight: 800; border: none; border-radius: 10px; padding: 14px; width: 100%; margin-bottom: 10px; transition: 0.2s; }

        /* TOP BAR CONTROLS */
        .controls-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: #111; padding: 10px 20px; border-radius: 16px; border: 1px solid #222; }
        .toggle-group { display: flex; gap: 5px; }
        .toggle-btn { background: transparent; border: none; color: var(--text-dim); padding: 8px 15px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; }
        .toggle-btn.active { background: #333; color: white; }

        /* CARDS */
        .flow-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .flow-card { background: var(--surface); border-radius: 20px; padding: 25px; border: 1px solid #222; position: relative; }
        .card-line { position: absolute; left: 0; top: 25%; bottom: 25%; width: 4px; border-radius: 0 4px 4px 0; }

        /* LISTING */
        .week-header { color: var(--opay-teal); font-weight: 800; font-size: 0.75rem; margin: 30px 0 10px; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; }
        .week-header::after { content: ""; height: 1px; background: #222; flex-grow: 1; margin-left: 15px; }
        
        .tx-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #111; border-radius: 15px; margin-bottom: 10px; border: 1px solid #222; transition: 0.2s; }
        .action-btns button { background: none; border: none; font-size: 1rem; margin-left: 12px; cursor: pointer; padding: 5px; opacity: 0.6; }

        /* PRINT */
        #printArea { display: none; }
        @media print {
            .sidebar, .main-content, .no-print { display: none !important; }
            #printArea { display: block !important; padding: 40px; color: #000; background: #fff; font-family: sans-serif; }
            .p-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #eee; font-size: 18px; }
        }

        #toast { visibility: hidden; min-width: 180px; background: var(--opay-teal); color: #000; text-align: center; border-radius: 50px; padding: 10px; position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: 800; z-index: 3000; font-size: 0.8rem; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

    <div id="toast">ACTION COMPLETE</div>

    <div class="sidebar no-print">
        <h5 class="fw-800 mb-4" style="letter-spacing: 2px;">REGISTRY</h5>
        
        <div class="live-box">
            <div class="live-time" id="clock">00:00:00</div>
            <div style="font-size: 0.7rem; color: var(--text-dim); margin-top: 5px;" id="liveDay">...</div>
        </div>

        <label class="label">Date</label>
        <input type="date" id="manualDate" class="input-custom">

        <label class="label">Reason</label>
        <input type="text" id="reason" class="input-custom" placeholder="DESCRIPTION">
        
        <label class="label">Amount (₦)</label>
        <input type="number" id="amount" class="input-custom" placeholder="0.00">
        
        <input type="hidden" id="editId" value="">
        
        <button id="mainBtn" onclick="saveRecord('income')" class="btn-opay">ADD ADDITION</button>
        <button id="subBtn" onclick="saveRecord('deduct')" class="btn-opay" style="background: transparent; border: 1px solid var(--opay-red); color: var(--opay-red);">ADD DEDUCTION</button>
        
        <button id="cancelEdit" onclick="resetForm()" class="btn btn-sm btn-link text-white-50 w-100" style="display:none; text-decoration: none; font-size: 0.7rem;">CANCEL EDIT</button>

        <div class="mt-auto pt-4">
            <button onclick="window.print()" class="btn btn-sm btn-outline-secondary w-100" style="border-radius: 8px; font-size: 0.7rem;">PRINT SUMMARY</button>
        </div>
    </div>

    <div class="main-content">
        <div class="controls-row">
            <div class="toggle-group">
                <button class="toggle-btn active" id="btn-month" onclick="setView('month')">Month View</button>
                <button class="toggle-btn" id="btn-all" onclick="setView('all')">All History</button>
            </div>

            <div class="d-flex gap-2">
                <select id="monthPicker" class="select-custom" onchange="render()"></select>
                <select id="yearPicker" class="select-custom" onchange="render()"></select>
            </div>
        </div>
        
        <div class="flow-grid">
            <div class="flow-card">
                <div class="card-line" style="background: var(--opay-teal);"></div>
                <div class="label" style="color: var(--opay-teal);">Additions</div>
                <h2 class="fw-800 mb-0">₦<span id="displayIn">0</span></h2>
            </div>
            <div class="flow-card">
                <div class="card-line" style="background: var(--opay-red);"></div>
                <div class="label" style="color: var(--opay-red);">Deductions</div>
                <h2 class="fw-800 mb-0">₦<span id="displayOut">0</span></h2>
            </div>
        </div>

        <div id="logContainer"></div>
    </div>

    <div id="printArea">
        <h1>Financial Summary</h1>
        <p>Period: <span id="pRangeLabel"></span></p>
        <hr>
        <div class="p-row"><span>Total Additions</span><span id="pIn"></span></div>
        <div class="p-row"><span>Total Deductions</span><span id="pOut"></span></div>
        <div class="p-row" style="font-weight:bold; border-top: 2px solid #000; margin-top: 20px; font-size: 22px;">
            <span>Net Balance</span><span id="pNet"></span>
        </div>
        <p style="margin-top: 50px; font-size: 12px; font-style: italic;">Generated: <span id="pTimestamp"></span></p>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('reg_flow_final_v22')) || [];
        let currentView = 'month';

        function init() {
            const now = new Date();
            const mPicker = document.getElementById('monthPicker');
            const yPicker = document.getElementById('yearPicker');
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            
            monthNames.forEach((name, i) => {
                let opt = document.createElement('option');
                opt.value = i; opt.innerText = name;
                if(i === now.getMonth()) opt.selected = true;
                mPicker.appendChild(opt);
            });

            const currentYear = now.getFullYear();
            for(let y = currentYear - 3; y <= currentYear + 2; y++) {
                let opt = document.createElement('option');
                opt.value = y; opt.innerText = y;
                if(y === currentYear) opt.selected = true;
                yPicker.appendChild(opt);
            }

            document.getElementById('manualDate').valueAsDate = now;
            setInterval(() => {
                const d = new Date();
                document.getElementById('clock').innerText = d.toLocaleTimeString([], {hour12: true, hour:'2-digit', minute:'2-digit', second:'2-digit'});
                document.getElementById('liveDay').innerText = d.toLocaleDateString(undefined, {weekday:'long', month:'short', day:'numeric'});
            }, 1000);
            render();
        }

        function showToast(msg) {
            const x = document.getElementById("toast");
            x.innerText = msg; x.className = "show";
            setTimeout(() => { x.className = x.className.replace("show", ""); }, 2000);
        }

        function saveRecord(type) {
            const amt = parseFloat(document.getElementById('amount').value);
            const reason = document.getElementById('reason').value.trim().toUpperCase() || "ENTRY";
            const date = document.getElementById('manualDate').value;
            const editId = document.getElementById('editId').value;

            if (!amt || !date) return showToast("FILL ALL FIELDS");

            const entry = { id: editId || Date.now(), amt, type, reason, date };

            if (editId) {
                const idx = db.findIndex(i => i.id == editId);
                if(idx !== -1) db[idx] = entry;
            } else {
                db.push(entry);
            }

            localStorage.setItem('reg_flow_final_v22', JSON.stringify(db));
            resetForm();
            render();
            showToast(editId ? "UPDATED" : "SAVED");
        }

        function editRecord(id) {
            const item = db.find(i => i.id == id);
            document.getElementById('amount').value = item.amt;
            document.getElementById('reason').value = item.reason;
            document.getElementById('manualDate').value = item.date;
            document.getElementById('editId').value = item.id;
            document.getElementById('mainBtn').innerText = "UPDATE ENTRY";
            document.getElementById('subBtn').style.display = "none";
            document.getElementById('cancelEdit').style.display = "block";
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function deleteRecord(id) {
            if(confirm("Delete this entry?")) {
                db = db.filter(i => i.id != id);
                localStorage.setItem('reg_flow_final_v22', JSON.stringify(db));
                render();
            }
        }

        function resetForm() {
            document.getElementById('amount').value = '';
            document.getElementById('reason').value = '';
            document.getElementById('editId').value = '';
            document.getElementById('manualDate').valueAsDate = new Date();
            document.getElementById('mainBtn').innerText = "ADD ADDITION";
            document.getElementById('subBtn').style.display = "block";
            document.getElementById('cancelEdit').style.display = "none";
        }

        function setView(v) {
            currentView = v;
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + v).classList.add('active');
            document.getElementById('monthPicker').disabled = (v === 'all');
            document.getElementById('yearPicker').disabled = (v === 'all');
            render();
        }

        function getWeekNumber(dateString) {
            const day = new Date(dateString).getDate();
            if (day <= 7) return 1;
            if (day <= 14) return 2;
            if (day <= 21) return 3;
            return 4;
        }

        function render() {
            let tin = 0, tout = 0;
            const selMonth = parseInt(document.getElementById('monthPicker').value);
            const selYear = parseInt(document.getElementById('yearPicker').value);
            
            const filtered = db.filter(i => {
                if (currentView === 'all') return true;
                const d = new Date(i.date);
                return d.getMonth() === selMonth && d.getFullYear() === selYear;
            }).sort((a,b) => new Date(b.date) - new Date(a.date));

            const weeks = { 1: [], 2: [], 3: [], 4: [] };
            filtered.forEach(i => {
                const w = getWeekNumber(i.date);
                weeks[w].push(i);
                i.type === 'income' ? tin += i.amt : tout += i.amt;
            });

            let html = '';
            for (let w = 4; w >= 1; w--) {
                if (weeks[w].length > 0) {
                    html += `<div class="week-header">WEEK ${w}</div>`;
                    weeks[w].forEach(i => {
                        html += `
                        <div class="tx-item">
                            <div>
                                <div class="fw-800">${i.reason}</div>
                                <div class="text-dim" style="font-size:0.65rem">${i.date}</div>
                            </div>
                            <div class="d-flex align-items-center">
                                <span class="fw-800 ${i.type === 'income' ? 'text-success' : 'text-danger'}">₦${i.amt.toLocaleString()}</span>
                                <div class="action-btns no-print">
                                    <button onclick="editRecord(${i.id})" style="color: #666">✎</button>
                                    <button onclick="deleteRecord(${i.id})" style="color: var(--opay-red)">✕</button>
                                </div>
                            </div>
                        </div>`;
                    });
                }
            }

            document.getElementById('logContainer').innerHTML = html || '<div class="text-center py-5 text-dim">No records.</div>';
            document.getElementById('displayIn').innerText = tin.toLocaleString();
            document.getElementById('displayOut').innerText = tout.toLocaleString();
            
            const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            document.getElementById('pRangeLabel').innerText = (currentView === 'all') ? "ALL TIME" : `${monthNames[selMonth]} ${selYear}`;
            document.getElementById('pIn').innerText = '₦' + tin.toLocaleString();
            document.getElementById('pOut').innerText = '₦' + tout.toLocaleString();
            document.getElementById('pNet').innerText = '₦' + (tin - tout).toLocaleString();
            document.getElementById('pTimestamp').innerText = new Date().toLocaleString();
        }

        init();
    </script>
</body>
</html>
