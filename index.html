<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regulator Flow | Full-Page Print V27</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 340px;
            --bg: #0a0a0a;
            --surface: #161616;
            --opay-teal: #00d09c;
            --opay-red: #f43f5e;
            --text: #ffffff;
            --text-dim: #888888;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; margin: 0; display: flex; overflow-x: hidden; }

        /* SIDEBAR & UI */
        .sidebar { width: var(--sidebar-width); background: #000; height: 100vh; position: fixed; padding: 30px 25px; border-right: 1px solid #222; display: flex; flex-direction: column; overflow-y: auto; z-index: 100; }
        .main-content { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); padding: 40px; }
        .live-box { background: #111; border-radius: 12px; padding: 15px; border: 1px dashed #333; margin-bottom: 20px; text-align: center; }
        .live-time { font-size: 1.2rem; font-weight: 800; color: var(--opay-teal); }
        .label { font-size: 0.7rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; display: block; }
        .input-custom { background: #111; border: 1px solid #333; color: white; border-radius: 10px; padding: 12px; width: 100%; margin-bottom: 15px; font-size: 0.9rem; outline: none; }
        .btn-opay { background: var(--opay-teal); color: #000; font-weight: 800; border: none; border-radius: 10px; padding: 14px; width: 100%; margin-bottom: 10px; cursor: pointer; }
        .tx-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #111; border-radius: 15px; margin-bottom: 10px; border: 1px solid #222; }
        .week-header { font-weight: 800; color: var(--opay-teal); margin-top: 25px; margin-bottom: 10px; font-size: 0.85rem; letter-spacing: 1px; border-left: 3px solid var(--opay-teal); padding-left: 10px; }

        /* SUMMARY CARDS */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--surface); border-radius: 20px; padding: 25px; position: relative; overflow: hidden; border: 1px solid #222; }
        .stat-card::before { content: ''; position: absolute; left: 0; top: 20%; height: 60%; width: 5px; border-radius: 0 10px 10px 0; }
        .card-add::before { background: var(--opay-teal); }
        .card-deduct::before { background: var(--opay-red); }
        .stat-label { font-size: 0.75rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .label-add { color: var(--opay-teal); }
        .label-deduct { color: var(--opay-red); }
        .stat-value { font-size: 2.2rem; font-weight: 800; }

        /* PRINT STYLES */
        #printArea { display: none; }

        @media print {
            @page { size: A4; margin: 0.5cm; }
            body { background: #fff !important; color: #000 !important; }
            .sidebar, .main-content, .no-print { display: none !important; }
            #printArea { display: block !important; width: 100% !important; margin: 0 !important; padding: 15px !important; }
            .p-header { border-bottom: 3px solid #000; padding-bottom: 10px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: flex-end; }
            .p-summary-wrapper { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 30px; }
            .p-box { border: 1px solid #000; padding: 12px; background: #f9f9f9 !important; -webkit-print-color-adjust: exact; }
            .p-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
            .p-table th { background: #f0f0f0 !important; border: 1px solid #000; padding: 8px; text-align: left; font-size: 12px; -webkit-print-color-adjust: exact; }
            .p-table td { border: 1px solid #eee; padding: 8px; font-size: 12px; }
            .week-label-print { background: #000 !important; color: #fff !important; padding: 5px 12px; font-weight: bold; font-size: 13px; margin-top: 20px; display: inline-block; -webkit-print-color-adjust: exact; }
            .text-in { color: #008f68 !important; font-weight: bold; -webkit-print-color-adjust: exact; }
            .text-out { color: #d63031 !important; font-weight: bold; -webkit-print-color-adjust: exact; }
        }

        #toast { visibility: hidden; min-width: 180px; background: var(--opay-teal); color: #000; text-align: center; border-radius: 50px; padding: 10px; position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: 800; z-index: 3000; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

    <div id="toast">ACTION COMPLETE</div>

    <div class="sidebar no-print">
        <h5 class="fw-800 mb-4" style="letter-spacing: 2px;">REGISTRY</h5>
        <div class="live-box">
            <div class="live-time" id="clock">00:00:00</div>
            <div style="font-size: 0.7rem; color: var(--text-dim); margin-top: 5px;" id="liveDay">...</div>
        </div>

        <label class="label">Date</label>
        <input type="date" id="manualDate" class="input-custom">
        <label class="label">Reason</label>
        <input type="text" id="reason" class="input-custom" placeholder="DESCRIPTION">
        <label class="label">Amount (₦)</label>
        <input type="number" id="amount" class="input-custom" placeholder="0.00">
        
        <input type="hidden" id="editId" value="">
        <button id="mainBtn" onclick="saveRecord('income')" class="btn-opay">INFLOW</button>
        <button id="subBtn" onclick="saveRecord('deduct')" class="btn-opay" style="background: transparent; border: 1px solid var(--opay-red); color: var(--opay-red);">OUTFLOW</button>
        <button id="cancelEdit" onclick="resetForm()" class="btn btn-sm btn-link text-white-50 w-100" style="display:none; text-decoration: none;">CANCEL EDIT</button>

        <div class="mt-auto pt-4">
            <button onclick="window.print()" class="btn btn-sm btn-outline-secondary w-100">PRINT FULL PAGE REPORT</button>
        </div>
    </div>

    <div class="main-content">
        <div class="stat-grid">
            <div class="stat-card card-add">
                <span class="stat-label label-add">ADDITIONS</span>
                <div class="stat-value" id="uiInflow">₦0</div>
            </div>
            <div class="stat-card card-deduct">
                <span class="stat-label label-deduct">DEDUCTIONS</span>
                <div class="stat-value" id="uiOutflow">₦0</div>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="btn-group">
                <button id="btnMonth" class="btn btn-sm btn-dark" onclick="setView('month')">Month View</button>
                <button id="btnAll" class="btn btn-sm btn-outline-dark text-white" onclick="setView('all')">All History</button>
            </div>
            <div id="pickerContainer" class="d-flex gap-2">
                <select id="monthPicker" class="input-custom mb-0" style="width:130px" onchange="render()"></select>
                <select id="yearPicker" class="input-custom mb-0" style="width:100px" onchange="render()"></select>
            </div>
        </div>
        <div id="logContainer"></div>
    </div>

    <div id="printArea">
        <div class="p-header">
            <div>
                <h1 style="margin:0; font-weight: 800;">FINANCIAL REPORT</h1>
                <p style="margin:0; text-transform: uppercase; letter-spacing: 1px;" id="pRangeLabel"></p>
            </div>
            <div style="text-align: right; font-size: 12px;">
                <strong>TIMESTAMP:</strong> <br> <span id="pTimestamp"></span>
            </div>
        </div>
        <div class="p-summary-wrapper">
            <div class="p-box"><small>TOTAL INFLOW</small><br><strong class="text-in" style="font-size: 20px;" id="pIn"></strong></div>
            <div class="p-box"><small>TOTAL OUTFLOW</small><br><strong class="text-out" style="font-size: 20px;" id="pOut"></strong></div>
            <div class="p-box" style="border-left: 5px solid #000;"><small>NET BALANCE</small><br><strong style="font-size: 20px;" id="pNet"></strong></div>
        </div>
        <div id="pLogBody"></div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('reg_flow_v23')) || [];
        let currentView = 'month';

        function init() {
            const now = new Date();
            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            
            const mPicker = document.getElementById('monthPicker');
            months.forEach((name, i) => {
                let opt = document.createElement('option');
                opt.value = i; opt.innerText = name;
                if(i === now.getMonth()) opt.selected = true;
                mPicker.appendChild(opt);
            });

            const yPicker = document.getElementById('yearPicker');
            for(let y = 2024; y <= 2027; y++) {
                let opt = document.createElement('option');
                opt.value = y; opt.innerText = y;
                if(y === now.getFullYear()) opt.selected = true;
                yPicker.appendChild(opt);
            }

            document.getElementById('manualDate').valueAsDate = now;
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString();
                document.getElementById('liveDay').innerText = new Date().toDateString();
            }, 1000);
            render();
        }

        function saveRecord(type) {
            const amt = parseFloat(document.getElementById('amount').value);
            const reason = document.getElementById('reason').value.trim().toUpperCase() || "MISC";
            const date = document.getElementById('manualDate').value;
            const editId = document.getElementById('editId').value;

            if (!amt || !date) return;

            if (editId) {
                const idx = db.findIndex(i => i.id == editId);
                db[idx] = { id: editId, amt, type, reason, date };
                showToast("RECORD UPDATED");
            } else {
                db.push({ id: Date.now(), amt, type, reason, date });
                showToast("RECORD ADDED");
            }

            localStorage.setItem('reg_flow_v23', JSON.stringify(db));
            resetForm();
            render();
        }

        function editRecord(id) {
            const item = db.find(i => i.id == id);
            document.getElementById('amount').value = item.amt;
            document.getElementById('reason').value = item.reason;
            document.getElementById('manualDate').value = item.date;
            document.getElementById('editId').value = item.id;
            document.getElementById('mainBtn').innerText = "UPDATE AS INFLOW";
            document.getElementById('subBtn').innerText = "UPDATE AS OUTFLOW";
            document.getElementById('cancelEdit').style.display = "block";
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function resetForm() {
            document.getElementById('amount').value = '';
            document.getElementById('reason').value = '';
            document.getElementById('editId').value = '';
            document.getElementById('mainBtn').innerText = "ADD INFLOW";
            document.getElementById('subBtn').innerText = "ADD OUTFLOW";
            document.getElementById('cancelEdit').style.display = "none";
        }

        function deleteRecord(id) {
            if(confirm("Confirm Deletion?")) {
                db = db.filter(i => i.id != id);
                localStorage.setItem('reg_flow_v23', JSON.stringify(db));
                render();
            }
        }

        function showToast(msg) {
            const t = document.getElementById("toast");
            t.innerText = msg;
            t.className = "show";
            setTimeout(() => t.className = "", 3000);
        }

        function render() {
            const selMonth = parseInt(document.getElementById('monthPicker').value);
            const selYear = parseInt(document.getElementById('yearPicker').value);
            
            const filtered = db.filter(i => {
                if (currentView === 'all') return true;
                // FIX: Manual parsing prevents April/Timezone bugs
                const parts = i.date.split('-'); 
                const y = parseInt(parts[0]);
                const m = parseInt(parts[1]) - 1;
                return (y === selYear && m === selMonth);
            }).sort((a,b) => new Date(a.date) - new Date(b.date));

            let html = ''; let pBody = ''; let tin = 0; let tout = 0;
            const weeks = { 1:[], 2:[], 3:[], 4:[] };

            filtered.forEach(i => {
                const day = parseInt(i.date.split('-')[2]);
                const w = day <= 7 ? 1 : day <= 14 ? 2 : day <= 21 ? 3 : 4;
                weeks[w].push(i);
                i.type === 'income' ? tin += i.amt : tout += i.amt;
            });

            document.getElementById('uiInflow').innerText = '₦' + tin.toLocaleString();
            document.getElementById('uiOutflow').innerText = '₦' + tout.toLocaleString();

            [1,2,3,4].forEach(w => {
                if (weeks[w].length > 0) {
                    html += `<div class="week-header">WEEK ${w}</div>`;
                    pBody += `<div class="week-label-print">WEEK ${w}</div><table class="p-table"><thead><tr><th>Date</th><th>Description</th><th style="text-align:right">Amount</th></tr></thead><tbody>`;
                    weeks[w].forEach(i => {
                        html += `<div class="tx-item"><div><strong>${i.reason}</strong><br><small class="text-dim">${i.date}</small></div><div class="d-flex align-items-center"><span class="${i.type === 'income' ? 'text-success' : 'text-danger'} fw-800">₦${i.amt.toLocaleString()}</span><div class="no-print ms-3"><button class="btn btn-sm text-white" onclick="editRecord(${i.id})">✎</button><button class="btn btn-sm text-danger" onclick="deleteRecord(${i.id})">✕</button></div></div></div>`;
                        pBody += `<tr><td>${i.date}</td><td>${i.reason}</td><td style="text-align:right" class="${i.type === 'income' ? 'text-in' : 'text-out'}">₦${i.amt.toLocaleString()}</td></tr>`;
                    });
                    pBody += `</tbody></table>`;
                }
            });

            document.getElementById('logContainer').innerHTML = html || '<p class="text-center py-5 text-white-50">No Records Found</p>';
            document.getElementById('pLogBody').innerHTML = pBody;
            document.getElementById('pIn').innerText = '₦' + tin.toLocaleString();
            document.getElementById('pOut').innerText = '₦' + tout.toLocaleString();
            document.getElementById('pNet').innerText = '₦' + (tin - tout).toLocaleString();
            document.getElementById('pTimestamp').innerText = new Date().toLocaleString();
            document.getElementById('pRangeLabel').innerText = currentView === 'all' ? 'ALL HISTORY' : document.getElementById('monthPicker').options[selMonth].text + " " + selYear;
        }

        function setView(v) { 
            currentView = v; 
            const btnMonth = document.getElementById('btnMonth');
            const btnAll = document.getElementById('btnAll');
            const picker = document.getElementById('pickerContainer');
 
            if(v === 'all') {
                btnAll.className = "btn btn-sm btn-dark";
                btnMonth.className = "btn btn-sm btn-outline-dark text-white";
                picker.style.opacity = "0.3";
                picker.style.pointerEvents = "none";
            } else {
                btnMonth.className = "btn btn-sm btn-dark";
                btnAll.className = "btn btn-sm btn-outline-dark text-white";
                picker.style.opacity = "1";
                picker.style.pointerEvents = "auto";
            }
            render(); 
        }
        init();
    </script>
</body>
</html>
